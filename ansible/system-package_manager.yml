# -----------------------------------------------------------------------------
# This is based on
#  * https://github.com/lvancrayelynghe/ansible-ubuntu/blob/master/roles/common/tasks/main.yml
#  * https://github.com/tzutalin/ubuntu-ansible/blob/master/roles/repo-over-https/tasks/main.yml
# -----------------------------------------------------------------------------
---

- name: Setup essentials
  hosts: group_system

  tasks:

    - name: Ensure the system can use the HTTPS transport for APT
      register: apt_https_transport
      stat:
        path: "/usr/lib/apt/methods/https"

    - name: Install HTTPS transport for APT
      apt:
        pkg: apt-transport-https
        state: installed
      when:
        - not apt_https_transport.stat.exists

    - name: Enable all repositories in sources.list
      become: yes
      replace:
        path:    /etc/apt/sources.list
        regexp:  '^#\s?deb(.+)http://(.+)/ubuntu(.+)$'
        replace: 'deb\1http://\2/ubuntu\3'
        backup:  yes

    - name: Ensure that Aptitude repositories are up to date
      become: yes
      apt:
        update_cache: yes
        cache_valid_time: "{{ secret.config.package_manager.apt.cache_time | default(config.package_manager.apt.cache_time) }}"
